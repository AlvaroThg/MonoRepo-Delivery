name: Node.js CI

on:
  push: 
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: Satelite-Delivery-App/package-lock.json

      - name: Install dependencies
        working-directory: Satelite-Delivery-App
        run: npm install

      - name: Run tests
        working-directory: Satelite-Delivery-App
        run: npm run test

      - name: TypeScript validation (Opcional)
        working-directory: Satelite-Delivery-App
        run: npx tsc --noEmit

      - name: Build Web App
        working-directory: Satelite-Delivery-App
        run: npx expo export -p web

      - name: Archive Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: Satelite-Delivery-App/dist/
